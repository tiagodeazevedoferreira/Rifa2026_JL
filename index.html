<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rifa JL 2026 ⚽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Rifa JL 2026 ⚽</h1>
  <p id="user-info"></p>
</header>

<!-- LOGIN -->
<div id="login-area" class="modal" style="display:flex;">
  <div class="modal-content">
    <h2>Login / Cadastro</h2>

    <input type="text" id="login-nome" placeholder="Seu nome">
    <input type="tel" id="login-whatsapp" placeholder="WhatsApp (11999999999)" maxlength="11">
    <input type="password" id="login-senha" placeholder="Senha (mín 6 caracteres)">

    <button id="btn-login">Entrar / Criar conta</button>
    <button id="btn-reset">Esqueci a senha</button>

    <p id="login-msg"></p>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- CARRINHO -->
<div id="carrinho-box">
  <h3>🛒 Carrinho</h3>
  <ul id="carrinho-lista"></ul>
  <p>Total: R$ <span id="carrinho-total">0</span>,00</p>
  <button id="finalizar-btn">Finalizar e pagar</button>
</div>

<!-- PIX -->
<div id="pix-area" style="display:none;">
  <h3>PIX</h3>
  <p>Total: R$ <span id="valor-final">0</span>,00</p>
  <button id="copiar-pix-btn">Copiar PIX</button>
  <textarea id="pix-code"></textarea>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<script src="utils.js"></script>
<script src="app.js"></script>

</body>
</html>
