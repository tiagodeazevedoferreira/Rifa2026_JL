<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rifa JL 2026 ⚽</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Rifa JL 2026 ⚽</h1>
  <p id="user-info"></p>
</header>

<div id="pix-area" style="display:none; padding:15px; background:#fff;">
  <h3>💸 Pagamento via PIX</h3>
  <p>Total: R$ <span id="valor-final">0</span>,00</p>

  <button id="copiar-pix-btn">Copiar código PIX</button>
  <textarea id="pix-code" style="width:100%; height:80px;"></textarea>

  <p style="font-size:12px;">
    ⚠️ Após pagar, envie comprovante para WhatsApp 11984982090
  </p>
</div>

<div id="carrinho-box">
  <h3>🛒 Carrinho</h3>
  <ul id="carrinho-lista"></ul>
  <p>Total: R$ <span id="carrinho-total">0</span>,00</p>
  <button id="finalizar-btn">Finalizar e pagar</button>
  <button id="limpar-btn">Limpar carrinho</button>
</div>

<div id="minhas-compras"></div>

<div id="admin-area" style="display:none; padding:15px; background:#fafafa;">
  <h3>📊 Painel Admin</h3>

  <div style="margin-bottom:10px;">
    <button onclick="filtrarAdmin('todos')">Todos</button>
    <button onclick="filtrarAdmin('pendente')">Pendentes</button>
    <button onclick="filtrarAdmin('pago')">Pagos</button>
  </div>

  <div id="admin-resumo"></div>

  <div id="admin-list"></div>
</div>
<div id="login-area" class="modal" style="display:flex;">
  <div class="modal-content">
    <h2>Login</h2>
    <input type="text" id="login-nome">
    <input type="tel" id="login-whatsapp">
    <input type="password" id="login-senha">
    <button id="btn-login">Entrar</button>
    <button id="btn-reset">Trocar senha</button>
    <p id="login-msg"></p>
  </div>
</div>

<div id="grid" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>

</body>
</html>
